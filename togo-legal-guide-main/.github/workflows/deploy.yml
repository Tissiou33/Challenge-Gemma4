name: Deploy TypeScript app to GitHub Pages

on:
  push:
    branches: ['main']   # Se déclenche quand on pousse sur la branche 'main'
  workflow_dispatch:     # Permet un déclenchement manuel depuis l'interface GitHub

permissions:
  contents: read
  pages: write           # Nécessaire pour déployer
  id-token: write        # Nécessaire pour vérifier l'identité

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci          # Nettoie et installe les dépendances
      
      - name: Build the app
        run: npm run build   # Compile l'application TypeScript
        
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Disable Jekyll
        run: touch ./dist/.nojekyll   # remplacez "dist" par votre dossier de sortie réel

      - name: List output directory
        run: ls -la ./dist
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'     # 👈 Assurez-vous que le dossier correspond à votre dossier de sortie (dist, build, etc.)
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
